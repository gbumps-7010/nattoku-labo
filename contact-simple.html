<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【シンプル版】お問い合わせフォーム - ナットクLabo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        h1 {
            color: #3b82f6;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .notice {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 16px;
        }

        .required {
            background: #ef4444;
            color: white;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            margin-left: 8px;
            font-weight: 700;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Noto Sans JP', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3b82f6;
        }

        button[type="submit"] {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            font-family: 'Noto Sans JP', sans-serif;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        .success-message {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #065f46;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: 600;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .warning {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-envelope"></i> お問い合わせフォーム（シンプル版）</h1>
        <p class="subtitle">もう失敗しない。ナットクLabo</p>

        <div class="warning">
            <strong>⚠️ これはテスト用シンプル版です</strong><br>
            JavaScriptを使わず、HTMLの標準フォーム送信を使用します。<br>
            送信後、Formspreeのページに遷移します。
        </div>

        <div class="notice">
            <strong><i class="fas fa-info-circle"></i> 個人情報の取り扱いについて</strong><br>
            ご入力いただいた情報は、お問い合わせへの回答のみに使用し、第三者への提供は一切行いません。
        </div>

        <!-- シンプルフォーム（JavaScriptなし） -->
        <form action="https://formspree.io/f/mzdjnnap" method="POST">
            <!-- Formspree設定 -->
            <input type="hidden" name="_subject" value="【ナットクLabo・シンプル版】お問い合わせ">
            <input type="hidden" name="_next" value="https://nattoku-labo.com/privacy.html?success=true">

            <div class="form-group">
                <label for="name">
                    お名前<span class="required">必須</span>
                </label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    required 
                    placeholder="例：山田太郎"
                >
            </div>

            <div class="form-group">
                <label for="email">
                    メールアドレス<span class="required">必須</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="_replyto" 
                    required 
                    placeholder="例：example@email.com"
                >
            </div>

            <div class="form-group">
                <label for="subject">
                    お問い合わせ種別<span class="required">必須</span>
                </label>
                <select id="subject" name="subject" required>
                    <option value="">選択してください</option>
                    <option value="プライバシーポリシーについて">プライバシーポリシーについて</option>
                    <option value="著作権・肖像権について">著作権・肖像権について</option>
                    <option value="データの正確性について">データの正確性について</option>
                    <option value="アフィリエイトについて">アフィリエイトについて</option>
                    <option value="その他">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">
                    お問い合わせ内容<span class="required">必須</span>
                </label>
                <textarea 
                    id="message" 
                    name="message" 
                    required 
                    placeholder="お問い合わせ内容をご記入ください"
                ></textarea>
            </div>

            <div class="form-group">
                <label class="checkbox-group">
                    <input type="checkbox" name="agree" value="同意する" required>
                    <span>プライバシーポリシーに同意する</span>
                </label>
            </div>

            <!-- スパム対策 -->
            <input type="text" name="_gotcha" style="display:none">

            <button type="submit">
                <i class="fas fa-paper-plane"></i>
                送信する
            </button>
        </form>

        <div class="back-link">
            <a href="./privacy.html"><i class="fas fa-arrow-left"></i> プライバシーポリシーに戻る</a>
        </div>
    </div>

    <script>
        // URLパラメータをチェック
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success') === 'true') {
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.innerHTML = `
                <i class="fas fa-check-circle"></i>
                <strong>✅ 送信完了</strong><br>
                お問い合わせを受け付けました。内容を確認の上、3営業日以内にご連絡いたします。
            `;
            document.querySelector('.container').insertBefore(successDiv, document.querySelector('form'));
            
            // 3秒後にフォームにスクロール
            setTimeout(() => {
                successDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }
    </script>
</body>
</html>
