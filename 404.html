<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>ページが見つかりません | ナットクLabo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            color: #0f172a;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
        }

        main {
            width: min(100%, 640px);
            padding: 48px 32px;
            text-align: center;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        .status {
            margin: 0;
            color: #1e40af;
            font-size: clamp(4rem, 15vw, 7rem);
            font-weight: 800;
            line-height: 1;
        }

        h1 {
            margin: 20px 0 12px;
            font-size: clamp(1.5rem, 5vw, 2rem);
        }

        p {
            margin: 0 0 28px;
            color: #475569;
            line-height: 1.8;
        }

        a {
            display: inline-block;
            padding: 13px 24px;
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            background: #1e40af;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <main>
        <p class="status" aria-hidden="true">404</p>
        <h1>ページが見つかりません</h1>
        <p>URLが変更されたか、ページが削除された可能性があります。</p>
        <a href="/">トップページへ戻る</a>
    </main>
</body>
</html>
